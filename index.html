<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hyper Automation Platform</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0f172a; color: white; display: flex; }
        /* القائمة الجانبية */
        .sidebar { width: 200px; background: #1e293b; height: 100vh; padding: 20px; }
        .sidebar a { display: block; color: #cbd5e1; padding: 10px; text-decoration: none; margin-bottom: 10px; }
        /* المحتوى الرئيسي */
        .main-content { flex: 1; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>HyperAuto</h2>
        <a href="#">📊 لوحة التحكم</a>
        <a href="#">⚙️ الأتمتة</a>
        <a href="#">👥 العملاء</a>
        <a href="#">🔧 الإعدادات</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>لوحة التحكم</h1>
            <div id="content">جاري تحميل بيانات الأتمتة...</div>
        </div>
    </div>

    <script>
        const base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        fetch(base + '/dashboard_data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('content').innerHTML = `
                    <h3>ملخص العمليات</h3>
                    <table>
                        <tr><th>العملية</th><th>الحالة</th></tr>
                        <tr><td>نظام الأتمتة</td><td>${data.status || 'نشط'}</td></tr>
                    </table>
                `;
            })
            .catch(() => {
                document.getElementById('content').innerHTML = '<p>خطأ في جلب ملف البيانات.</p>';
            });
    </script>
</body>
</html>
