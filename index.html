<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الأتمتة الفائقة</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0f172a; color: white; display: flex; }
        .sidebar { width: 200px; background: #1e293b; height: 100vh; padding: 20px; }
        .main-content { flex: 1; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: right; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>HyperAuto</h2>
        <a href="#" style="color:white; text-decoration:none;">📊 لوحة التحكم</a>
    </div>
    <div class="main-content">
        <div class="card">
            <h1>مركز التحكم بالأتمتة</h1>
            <button onclick="runAutomation()">تشغيل محرك الأتمتة الآن</button>
            <div id="status" style="margin-top:20px;">حالة النظام: جاهز للعمل</div>
        </div>
        <div class="card">
            <h3>نتائج العمليات</h3>
            <div id="content">جاري تحميل البيانات...</div>
        </div>
    </div>

    <script>
        function runAutomation() {
            document.getElementById('status').innerText = "جاري تشغيل محرك الأتمتة... يرجى الانتظار.";
            // هنا سيتم الربط مستقبلاً مع API المحرك
            setTimeout(() => {
                document.getElementById('status').innerText = "تمت الأتمتة بنجاح! تم تحديث البيانات.";
                loadData();
            }, 2000);
        }

        function loadData() {
            fetch('dashboard_data.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('content').innerHTML = `
                        <table>
                            <tr><th>العملية</th><th>الحالة</th></tr>
                            <tr><td>${data.process_name}</td><td>${data.status}</td></tr>
                        </table>
                    `;
                });
        }
        loadData();
    </script>
</body>
</html>
