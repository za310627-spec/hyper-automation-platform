<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الأتمتة الفائقة</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1 { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: right; }
    </style>
</head>
<body>
    <div class="card">
        <h1>لوحة التحكم</h1>
        <div id="content">جاري عرض البيانات...</div>
    </div>

    <script>
        const base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        fetch(base + '/dashboard_data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('content').innerHTML = `
                    <h3>ملخص العمليات</h3>
                    <table>
                        <tr><th>العملية</th><th>الحالة</th></tr>
                        <tr><td>أتمتة المبيعات</td><td>نشط</td></tr>
                        <tr><td>تنسيق العملاء</td><td>مكتمل</td></tr>
                    </table>
                `;
            });
    </script>
</body>
</html>
