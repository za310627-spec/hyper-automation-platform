<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الأتمتة الفائقة</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1 { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: right; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>لوحة التحكم</h1>
        <div id="data-container">جاري تحميل البيانات...</div>
    </div>

    <script>
        const base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        fetch(base + '/dashboard_data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('data-container').innerHTML = '<p>تم تحميل البيانات بنجاح!</p>';
                console.log(data);
            })
            .catch(err => {
                document.getElementById('data-container').innerHTML = '<p>خطأ في تحميل البيانات، تأكد من وجود ملف JSON.</p>';
            });
    </script>
</body>
</html>
