name: Run Hyper Automation Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'automation_engine.py'
      - '.github/workflows/run_automation.yml'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # تم التحديث إلى v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # تم التحديث إلى v4
      - name: Setup Node (Required for modern setups)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 playwright requests
      
      - name: Initialize Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run Automation Engine
        run: |
          python automation_engine.py
        continue-on-error: true
      
      - name: Check for generated data
        id: check_data
        run: |
          if [ -f "dashboard_data.json" ]; then
            echo "data_exists=true" >> $GITHUB_OUTPUT
            echo "✓ Dashboard data file generated successfully"
            ls -lh dashboard_data.json
          else
            echo "data_exists=false" >> $GITHUB_OUTPUT
            echo "⚠ Dashboard data file not found"
          fi
      
      - name: Display Automation Logs
        if: always()
        run: |
          if [ -f "automation_engine.log" ]; then
            echo "=== Automation Engine Log ==="
            tail -50 automation_engine.log
            echo "=== End of Log ==="
          else
            echo "No automation log file found"
          fi
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
      
      - name: Commit and Push Changes
        if: steps.check_data.outputs.data_exists == 'true'
        run: |
          if git diff --quiet dashboard_data.json; then
            echo "No changes to dashboard_data.json"
          else
            echo "Changes detected in dashboard_data.json"
            git add dashboard_data.json
            git commit -m "chore: update dashboard data from automation engine"
            git push origin main
            echo "✓ Changes pushed to repository"
          fi
      
      - name: Commit Logs on Error
        if: failure()
        continue-on-error: true
        run: |
          if [ -f "automation_engine.log" ]; then
            git add automation_engine.log
            git commit -m "chore: automation engine execution logs [failed]"
            git push origin main
          fi
      
      # تم التحديث إلى v4 لحل مشكلة الإيقاف (Deprecation)
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-artifacts
          path: |
            dashboard_data.json
            automation_engine.log
          retention-days: 7
