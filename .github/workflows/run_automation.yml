name: Run Hyper Automation Engine

on:
  # Run on a schedule - every hour
  schedule:
    - cron: '0 * * * *'
  
  # Allow manual triggering
  workflow_dispatch:
  
  # Run on push to main branch (optional)
  push:
    branches:
      - main
    paths:
      - 'automation_engine.py'
      - '.github/workflows/run_automation.yml'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
      actions: read
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 playwright requests
      
      # Initialize Playwright browsers
      - name: Initialize Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      # Run the automation engine
      - name: Run Automation Engine
        run: |
          python automation_engine.py
        continue-on-error: true
      
      # Check if dashboard_data.json was generated
      - name: Check for generated data
        id: check_data
        run: |
          if [ -f "dashboard_data.json" ]; then
            echo "data_exists=true" >> $GITHUB_OUTPUT
            echo "✓ Dashboard data file generated successfully"
            ls -lh dashboard_data.json
          else
            echo "data_exists=false" >> $GITHUB_OUTPUT
            echo "⚠ Dashboard data file not found"
          fi
      
      # Display automation logs
      - name: Display Automation Logs
        if: always()
        run: |
          if [ -f "automation_engine.log" ]; then
            echo "=== Automation Engine Log ==="
            tail -50 automation_engine.log
            echo "=== End of Log ==="
          else
            echo "No automation log file found"
          fi
      
      # Configure git for commits
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
      
      # Commit and push updated data
      - name: Commit and Push Changes
        if: steps.check_data.outputs.data_exists == 'true'
        run: |
          # Check if there are changes
          if git diff --quiet dashboard_data.json; then
            echo "No changes to dashboard_data.json"
          else
            echo "Changes detected in dashboard_data.json"
            git add dashboard_data.json
            git commit -m "chore: update dashboard data from automation engine
  
          - Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - Triggered by: ${{ github.event_name }}
          - Run ID: ${{ github.run_id }}
          - Automation Engine Version: 1.0.0"
            git push origin main
            echo "✓ Changes pushed to repository"
          fi
      
      # Also commit logs on error
      - name: Commit Logs on Error
        if: failure()
        continue-on-error: true
        run: |
          if [ -f "automation_engine.log" ]; then
            git add automation_engine.log
            git commit -m "chore: automation engine execution logs
  
          - Status: Failed
          - Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - Triggered by: ${{ github.event_name }}
          - Run ID: ${{ github.run_id }}"
            git push origin main
          fi
      
      # Upload artifacts for debugging
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: automation-artifacts
          path: |
            dashboard_data.json
            automation_engine.log
          retention-days: 7
      
      # Notify on success
      - name: Success Notification
        if: success() && steps.check_data.outputs.data_exists == 'true'
        run: |
          echo "✓ Automation workflow completed successfully"
          echo "✓ Dashboard data updated and committed"
          echo "Next run scheduled for: $(date -d '+1 hour' -u +'%Y-%m-%d %H:%M:%S UTC')"
      
      # Notify on failure
      - name: Failure Notification
        if: failure()
        run: |
          echo "✗ Automation workflow failed"
          echo "Check the logs above for details"
          exit 1
